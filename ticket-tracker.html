<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チケット記録</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --accent: #4f7cff;
    --plus: #2bb673;
    --minus: #e05a5a;
    --text: #1f2433;
    --muted: #8a90a2;
    --border: #e6e9f2;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 18px; display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  h1 { font-size: 19px; margin: 0; flex: 1; }
  .summary { font-size: 13px; color: var(--muted); }
  .summary b { color: var(--accent); font-size: 15px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  button.tool {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer;
  }
  button.tool:hover { background: #f0f3fb; }
  .grid {
    display: grid; gap: 10px; padding: 16px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    max-width: 1100px; margin: 0 auto;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .num { font-size: 12px; color: var(--muted); width: 22px; text-align: center; flex-shrink: 0; }
  .name {
    flex: 1; border: none; background: transparent; font-size: 15px; font-weight: 600;
    color: var(--text); min-width: 0; padding: 4px 2px; border-radius: 6px;
  }
  .name:focus { outline: none; background: #eef2ff; }
  .count {
    font-size: 20px; font-weight: 700; min-width: 34px; text-align: center;
    color: var(--accent);
  }
  .btn {
    width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer;
    font-size: 20px; font-weight: 700; color: #fff; line-height: 1; flex-shrink: 0;
  }
  .btn.plus { background: var(--plus); }
  .btn.minus { background: var(--minus); }
  .btn:active { transform: scale(0.9); }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 16px; }
</style>
</head>
<body>
<header>
  <h1>🎟 チケット記録</h1>
  <div class="summary">合計 <b id="total">0</b> 枚 / トップ <b id="topName">-</b></div>
  <div class="toolbar">
    <button class="tool" id="sortBtn">枚数順に並べ替え</button>
    <button class="tool" id="resetBtn">全リセット</button>
  </div>
</header>
<div class="grid" id="grid"></div>
<footer>データはこの端末のブラウザに自動保存されます</footer>

<script>
const STUDENTS = 32;
const KEY = 'ticket-tracker-v1';

let data = load();

function load() {
  try {
    const saved = JSON.parse(localStorage.getItem(KEY));
    if (Array.isArray(saved) && saved.length === STUDENTS) return saved;
  } catch (e) {}
  return Array.from({length: STUDENTS}, (_, i) => ({ name: '生徒' + (i + 1), count: 0 }));
}
function save() { localStorage.setItem(KEY, JSON.stringify(data)); }

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  data.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <span class="num">${i + 1}</span>
      <input class="name" value="${escapeHtml(s.name)}" data-i="${i}">
      <button class="btn minus" data-i="${i}" data-d="-1">−</button>
      <span class="count" id="c${i}">${s.count}</span>
      <button class="btn plus" data-i="${i}" data-d="1">+</button>
    `;
    grid.appendChild(card);
  });
  updateSummary();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateSummary() {
  const total = data.reduce((a, s) => a + s.count, 0);
  document.getElementById('total').textContent = total;
  let top = data[0];
  data.forEach(s => { if (s.count > top.count) top = s; });
  document.getElementById('topName').textContent = top.count > 0 ? top.name : '-';
}

document.getElementById('grid').addEventListener('click', e => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const i = +btn.dataset.i, d = +btn.dataset.d;
  data[i].count = Math.max(0, data[i].count + d);
  document.getElementById('c' + i).textContent = data[i].count;
  updateSummary();
  save();
});

document.getElementById('grid').addEventListener('input', e => {
  if (e.target.classList.contains('name')) {
    data[+e.target.dataset.i].name = e.target.value;
    updateSummary();
    save();
  }
});

document.getElementById('sortBtn').addEventListener('click', () => {
  data.sort((a, b) => b.count - a.count);
  save();
  render();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('全員の枚数を0に戻しますか？（名前は残ります）')) {
    data.forEach(s => s.count = 0);
    save();
    render();
  }
});

render();
</script>
</body>
</html>
